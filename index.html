<!DOCTYPE html>
<html lang="th">

<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <!-- nexo: Google Sheets Integration -->
    <title>MoneyFlow 3D | nexo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* nexo theme tokens - ระบบป้องกันการก๊อปปี้ */
        :root,
        [data-theme="dark"] {
            --bg0: #09090c;
            --bg1: #111116;
            --bg2: #18181f;
            --bg3: #202028;
            --bd0: rgba(255, 255, 255, .055);
            --bd1: rgba(255, 255, 255, .1);
            --bd2: rgba(255, 255, 255, .18);
            --tx0: #eef0f8;
            --tx1: #9098b8;
            --tx2: #454d6a;
            --sh: rgba(0, 0, 0, .65);
            --hi: rgba(255, 255, 255, .08);
            --lo: rgba(0, 0, 0, .7);
            --gb: rgba(255, 255, 255, .035);
            --gbd: rgba(255, 255, 255, .07);
        }

        [data-theme="light"] {
            --bg0: #dde0ea;
            --bg1: #e8ebf4;
            --bg2: #f2f4fb;
            --bg3: #ffffff;
            --bd0: rgba(0, 0, 0, .07);
            --bd1: rgba(0, 0, 0, .13);
            --bd2: rgba(0, 0, 0, .22);
            --tx0: #0d0f1a;
            --tx1: #3a4260;
            --tx2: #8592b8;
            --sh: rgba(100, 110, 160, .18);
            --hi: rgba(255, 255, 255, .9);
            --lo: rgba(160, 170, 210, .4);
            --gb: rgba(255, 255, 255, .5);
            --gbd: rgba(255, 255, 255, .75);
        }

        :root {
            --acc: #6c63ff;
            --acc2: #8b5cf6;
            --acc3: #a78bfa;
            --ar: 108, 99, 255;
            --inc: #00d68f;
            --ir: 0, 214, 143;
            --exp: #ff4d6d;
            --er: 255, 77, 109;
            --gld: #ffb833;
            --gr: 255, 184, 51;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body,
        #root {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg0);
            color: var(--tx0);
            font-family: 'Noto Sans Thai', sans-serif;
            font-size: 14px;
            line-height: 1.55;
            transition: background .3s, color .3s;
        }

        .jb {
            font-family: 'JetBrains Mono', monospace;
        }

        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bd1);
            border-radius: 3px;
        }

        /* 3D CARD - nexo style */
        .c3 {
            background: var(--bg2);
            border: 1px solid var(--bd0);
            border-radius: 18px;
            box-shadow:
                0 1px 0 var(--hi) inset, 0 -1px 0 var(--lo) inset,
                1px 0 0 var(--hi) inset, -1px 0 0 var(--lo) inset,
                0 8px 28px var(--sh), 0 2px 6px rgba(var(--ar), .06);
            position: relative;
            overflow: hidden;
            transition: transform .2s, box-shadow .2s;
        }

        .c3::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            background: linear-gradient(145deg, var(--hi) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        .c3:hover {
            transform: translateY(-2px);
            box-shadow: 0 1px 0 var(--hi) inset, 0 -1px 0 var(--lo) inset, 1px 0 var(--hi) inset, -1px 0 var(--lo) inset,
                0 16px 44px var(--sh), 0 4px 14px rgba(var(--ar), .12);
        }

        /* BUTTONS */
        .bp,
        .bg,
        .bd {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 13px;
            cursor: pointer;
            font-family: 'Noto Sans Thai', sans-serif;
            font-weight: 700;
            font-size: 13.5px;
            border: none;
            outline: none;
            position: relative;
            overflow: hidden;
            transition: all .18s cubic-bezier(.34, 1.56, .64, 1);
            user-select: none;
        }

        .bp::before,
        .bg::before,
        .bd::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, .2), transparent);
            pointer-events: none;
        }

        .bp {
            background: linear-gradient(145deg, var(--acc), var(--acc2));
            color: #fff;
            padding: 12px 18px;
            box-shadow: 0 1px 0 rgba(255, 255, 255, .22) inset, 0 4px 16px rgba(var(--ar), .42), 0 1px 4px rgba(0, 0, 0, .35);
        }

        .bp:hover {
            transform: translateY(-2px);
            box-shadow: 0 1px 0 rgba(255, 255, 255, .22) inset, 0 8px 26px rgba(var(--ar), .58);
        }

        .bp:active {
            transform: translateY(1px) scale(.97);
        }

        .bg {
            background: var(--bg2);
            color: var(--tx1);
            padding: 11px 18px;
            border: 1.5px solid var(--bd1);
            box-shadow: 0 1px 0 var(--hi) inset, 0 -1px 0 var(--lo) inset, 0 4px 12px var(--sh);
        }

        .bg:hover {
            border-color: var(--bd2);
            color: var(--tx0);
        }

        .bd {
            background: rgba(var(--er), .1);
            color: var(--exp);
            padding: 11px 18px;
            border: 1.5px solid rgba(var(--er), .3);
            box-shadow: 0 4px 12px rgba(var(--er), .12);
        }

        .bd:hover {
            background: rgba(var(--er), .18);
        }

        .bs {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: var(--bg2);
            border: 1px solid var(--bd1);
            color: var(--tx1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all .15s;
            box-shadow: 0 2px 8px var(--sh), 0 1px 0 var(--hi) inset;
        }

        .bs:hover {
            color: var(--tx0);
            border-color: var(--bd2);
        }

        .bsd:hover {
            color: var(--exp);
            border-color: rgba(var(--er), .4);
        }

        /* LAYOUT */
        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--bg0);
            transition: background .3s;
        }

        @media(min-width:769px) {

            html,
            body {
                overflow: auto;
            }

            #app {
                flex-direction: row;
                height: 100vh;
            }

            #sb {
                display: flex !important;
            }

            #bn {
                display: none !important;
            }

            #mw {
                flex: 1;
                height: 100vh;
                overflow-y: auto;
                padding-bottom: 40px;
            }

            .mhdr {
                display: none !important;
            }
        }

        @media(max-width:768px) {
            #sb {
                display: none !important;
            }

            #mw {
                flex: 1;
                overflow-y: auto;
                padding-bottom: 76px;
            }
        }

        /* SIDEBAR */
        #sb {
            width: 240px;
            min-width: 240px;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            background: var(--bg1);
            border-right: 1px solid var(--bd0);
            padding: 0 0 28px;
            z-index: 10;
            overflow: hidden;
        }

        .sl {
            padding: 22px 20px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--bd0);
            margin-bottom: 10px;
        }

        .orb {
            width: 40px;
            height: 40px;
            border-radius: 13px;
            flex-shrink: 0;
            background: linear-gradient(145deg, var(--acc), var(--acc2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 4px 14px rgba(var(--ar), .48), 0 1px 0 rgba(255, 255, 255, .28) inset;
            position: relative;
        }

        .orb::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 13px;
            background: linear-gradient(145deg, rgba(255, 255, 255, .25), transparent);
            pointer-events: none;
        }

        .lt {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -.3px;
        }

        .ls {
            font-size: 10px;
            color: var(--tx2);
            letter-spacing: .08em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .sadd {
            margin: 4px 12px 10px;
            background: linear-gradient(145deg, var(--acc), var(--acc2));
            color: #fff;
            border: none;
            border-radius: 13px;
            padding: 12px 16px;
            width: calc(100% - 24px);
            display: flex;
            align-items: center;
            gap: 9px;
            cursor: pointer;
            font-family: 'Noto Sans Thai', sans-serif;
            font-size: 13px;
            font-weight: 700;
            transition: all .2s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(var(--ar), .38), 0 1px 0 rgba(255, 255, 255, .22) inset;
        }

        .sadd::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, .2), transparent);
            pointer-events: none;
        }

        .sadd:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 22px rgba(var(--ar), .52);
        }

        .sadd:active {
            transform: translateY(1px);
        }

        .ssec {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--tx2);
            padding: 10px 20px 5px;
        }

        .si {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 10px 16px;
            margin: 1px 10px;
            border-radius: 12px;
            cursor: pointer;
            color: var(--tx1);
            font-size: 13px;
            font-weight: 500;
            transition: all .15s;
            border: none;
            background: none;
            font-family: 'Noto Sans Thai', sans-serif;
            width: calc(100% - 20px);
            text-align: left;
        }

        .si i {
            width: 20px;
            text-align: center;
            font-size: 15px;
        }

        .si:hover {
            background: var(--bg2);
            color: var(--tx0);
        }

        .si.on {
            background: linear-gradient(145deg, rgba(var(--ar), .18), rgba(var(--ar), .07));
            color: var(--acc);
            font-weight: 700;
            border: 1px solid rgba(var(--ar), .18);
            box-shadow: 0 2px 8px rgba(var(--ar), .12);
        }

        /* MOBILE HEADER */
        .mhdr {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            background: var(--bg1);
            border-bottom: 1px solid var(--bd0);
            position: sticky;
            top: 0;
            z-index: 50;
            flex-shrink: 0;
        }

        .mhl {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 16px;
            font-weight: 800;
        }

        .mhr {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        /* BOTTOM NAV */
        #bn {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 62px;
            z-index: 100;
            background: var(--bg1);
            border-top: 1px solid var(--bd0);
            display: flex;
            align-items: stretch;
            box-shadow: 0 -6px 28px var(--sh);
        }

        .bni {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--tx2);
            font-size: 10px;
            font-weight: 600;
            font-family: 'Noto Sans Thai', sans-serif;
            transition: color .15s;
            padding: 6px 4px;
        }

        .bni i {
            font-size: 18px;
            margin-bottom: 1px;
        }

        .bni.on {
            color: var(--acc);
        }

        .fabw {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .fabo {
            width: 48px;
            height: 48px;
            border-radius: 15px;
            background: linear-gradient(145deg, var(--acc), var(--acc2));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            margin-bottom: 1px;
            box-shadow: 0 4px 16px rgba(var(--ar), .52), 0 1px 0 rgba(255, 255, 255, .28) inset;
            transition: all .2s cubic-bezier(.34, 1.56, .64, 1);
            position: relative;
            overflow: hidden;
        }

        .fabo::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, .22), transparent);
            pointer-events: none;
        }

        .fabw:active .fabo {
            transform: scale(.88);
        }

        /* PAGE */
        .pg {
            padding: clamp(13px, 3.5vw, 22px);
            animation: pgin .28s cubic-bezier(.16, 1, .3, 1);
        }

        @keyframes pgin {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .phd {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .ptl {
            font-size: clamp(17px, 4vw, 21px);
            font-weight: 800;
            letter-spacing: -.4px;
        }

        .ptl i {
            margin-right: 8px;
            color: var(--acc);
        }

        /* HERO */
        .hero {
            border-radius: 22px;
            padding: clamp(17px, 4vw, 26px);
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, var(--acc) 0%, var(--acc2) 55%, #4f46e5 100%);
            box-shadow: 0 1px 0 rgba(255, 255, 255, .28) inset, 0 -1px 0 rgba(0, 0, 0, .28) inset,
                0 14px 44px rgba(var(--ar), .42), 0 4px 12px rgba(0, 0, 0, .28);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -15%;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .065);
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -60%;
            left: -10%;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(0, 0, 0, .1);
            pointer-events: none;
        }

        .hl {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .6);
            margin-bottom: 5px;
        }

        .ha {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(26px, 7vw, 38px);
            font-weight: 700;
            letter-spacing: -1.5px;
            color: #fff;
            margin-bottom: 3px;
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 12px rgba(0, 0, 0, .28);
        }

        .hs {
            font-size: 11px;
            color: rgba(255, 255, 255, .5);
            position: relative;
            z-index: 1;
        }

        .hchips {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            position: relative;
            z-index: 1;
        }

        .hch {
            background: rgba(255, 255, 255, .11);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, .18);
            border-radius: 12px;
            padding: 9px 13px;
            flex: 1;
            box-shadow: 0 1px 0 rgba(255, 255, 255, .14) inset;
        }

        .hcl {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .55);
            margin-bottom: 3px;
        }

        .hcv {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -.4px;
        }

        /* SUMMARY CARDS */
        .sg {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .sc {
            border-radius: 16px;
            padding: 13px 15px;
            border: 1px solid;
            position: relative;
            overflow: hidden;
        }

        .sc::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, var(--hi), transparent);
            pointer-events: none;
        }

        .sci {
            background: rgba(var(--ir), .1);
            border-color: rgba(var(--ir), .25);
        }

        .sce {
            background: rgba(var(--er), .1);
            border-color: rgba(var(--er), .25);
        }

        .scb {
            background: rgba(var(--ar), .1);
            border-color: rgba(var(--ar), .25);
            border-radius: 16px;
            padding: 13px 16px;
            position: relative;
            overflow: hidden;
        }

        .scb::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(180deg, var(--hi), transparent);
            pointer-events: none;
        }

        .slb {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            color: var(--tx2);
            margin-bottom: 5px;
        }

        .slb i {
            margin-right: 4px;
        }

        .sv {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(15px, 4vw, 19px);
            font-weight: 700;
            letter-spacing: -.8px;
        }

        /* PERIOD TABS */
        .ptabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 2px;
            margin-bottom: 13px;
            scrollbar-width: none;
        }

        .ptabs::-webkit-scrollbar {
            display: none;
        }

        .pt {
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: all .16s;
            border: 1.5px solid var(--bd1);
            background: transparent;
            color: var(--tx2);
            font-family: 'Noto Sans Thai', sans-serif;
            box-shadow: 0 2px 6px var(--sh);
        }

        .pt:hover {
            border-color: var(--bd2);
            color: var(--tx1);
        }

        .pt.on {
            background: linear-gradient(145deg, var(--acc), var(--acc2));
            border-color: var(--acc);
            color: #fff;
            box-shadow: 0 3px 12px rgba(var(--ar), .4);
        }

        /* TX ITEM */
        .txr {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 11px 0;
            border-bottom: 1px solid var(--bd0);
            cursor: pointer;
            transition: padding .15s;
        }

        .txr:last-child {
            border-bottom: none;
        }

        .txr:hover {
            padding-left: 4px;
        }

        .txic {
            width: 41px;
            height: 41px;
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 3px 10px var(--sh), 0 1px 0 var(--hi) inset;
        }

        .txic::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            border-radius: 13px 13px 0 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, .18), transparent);
            pointer-events: none;
        }

        .txin {
            flex: 1;
            min-width: 0;
        }

        .txca {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .txme {
            font-size: 11px;
            color: var(--tx2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .txrt {
            text-align: right;
            flex-shrink: 0;
        }

        .txam {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13.5px;
            font-weight: 700;
            letter-spacing: -.4px;
        }

        .txdt {
            font-size: 10px;
            color: var(--tx2);
            margin-top: 1px;
        }

        /* WALLET TABS */
        .wtabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 2px;
            margin-bottom: 11px;
            scrollbar-width: none;
        }

        .wtabs::-webkit-scrollbar {
            display: none;
        }

        .wt {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: all .16s;
            border: 1.5px solid var(--bd1);
            background: transparent;

<body data-theme="dark">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        /* ═══════════════════════════════════════════════════════════
           nexo Google Sheets API Configuration
           ═══════════════════════════════════════════════════════════ */

        // ใส่ URL ของ Google Apps Script Web App ที่นี่
        const NEXO_API_URL = 'https://script.google.com/macros/s/AKfycbxQYLc019_QpPNdOSDp2aQ3Ooa5cBBdaqcoKofngifsfAK-rPc3PJS-3POCndgIXjYOYA/exec';

        // nexo API Helper
        const nexoAPI = {
            async request(action, data = null) {
                try {
                    let response;
                    let responseText;

                    if (data) {
                        // สำหรับการส่งข้อมูล ใช้ POST
                        response = await fetch(NEXO_API_URL, {
                            method: 'POST',
                            mode: 'cors',
                            cache: 'no-cache',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action, data })
                        });
                    } else {
                        // สำหรับการดึงข้อมูล ใช้ GET
                        const url = new URL(NEXO_API_URL);
                        url.searchParams.append('action', action);
                        response = await fetch(url.toString(), {
                            method: 'GET',
                            mode: 'cors',
                            cache: 'no-cache'
                        });
                    }

                    responseText = await response.text();

                    // ลอง parse JSON
                    let result;
                    try {
                        result = JSON.parse(responseText);
                    } catch (parseError) {
                        console.error('Response is not JSON:', responseText.substring(0, 200));
                        throw new Error(`Invalid response from server: ${responseText.substring(0, 100)}`);
                    }

                    if (result.success) {
                        return result.data;
                    } else {
                        const errorMsg = result.error || 'nexo API error';
                        console.error('API Error:', errorMsg, result);
                        throw new Error(errorMsg);
                    }
                } catch (error) {
                    console.error('nexo API Error:', error);
                    throw error;
                }
            },

            // ดึงข้อมูลทั้งหมดในครั้งเดียว (ลดจำนวน API calls)
            getAllData: () => nexoAPI.request('getAllData'),

            // Transactions
            getTransactions: () => nexoAPI.request('getTransactions'),
            saveTransaction: (tx) => nexoAPI.request('saveTransaction', tx),
            deleteTransaction: (id) => nexoAPI.request('deleteTransaction', { id }),

            // Wallets
            getWallets: () => nexoAPI.request('getWallets'),
            saveWallet: (wallet) => nexoAPI.request('saveWallet', wallet),
            deleteWallet: (id) => nexoAPI.request('deleteWallet', { id }),

            // Expense Categories
            getExpenseCats: () => nexoAPI.request('getExpenseCats'),
            saveExpenseCat: (cat) => nexoAPI.request('saveExpenseCat', cat),
            deleteExpenseCat: (id) => nexoAPI.request('deleteExpenseCat', { id }),

            // Income Categories
            getIncomeCats: () => nexoAPI.request('getIncomeCats'),
            saveIncomeCat: (cat) => nexoAPI.request('saveIncomeCat', cat),
            deleteIncomeCat: (id) => nexoAPI.request('deleteIncomeCat', { id }),

            // Settings
            getSettings: () => nexoAPI.request('getSettings'),
            saveSettings: (settings) => nexoAPI.request('saveSettings', settings),
        };

        /* ════ HELPERS ════ */
        const uid = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
        const thNow = () => { const n = new Date(); const t = new Date(n.toLocaleString('en-US', { timeZone: 'Asia/Bangkok' })); return { date: `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, '0')}-${String(t.getDate()).padStart(2, '0')}`, time: `${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')}` }; };
        const TM = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        const fd = d => { if (!d) return ''; const [y, m, dd] = d.split('-'); return `${+dd} ${TM[+m - 1]} ${+y + 543}`; };
        const fm = n => { if (n == null) return '0'; const a = Math.abs(n); if (a >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, '') + 'M'; if (a >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, '') + 'K'; return Number(n).toLocaleString('th-TH', { maximumFractionDigits: 2 }); };
        const ff = n => Number(n || 0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const fpd = (txs, p, wid) => {
            const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Bangkok' }));
            let list = wid && wid !== 'all' ? txs.filter(t => t.walletId === wid) : txs;
            if (p === 'all') return list;
            const c = new Date(now);
            ({
                '1d': () => c.setDate(c.getDate() - 1), '7d': () => c.setDate(c.getDate() - 7),
                '1m': () => c.setMonth(c.getMonth() - 1), '3m': () => c.setMonth(c.getMonth() - 3),
                '6m': () => c.setMonth(c.getMonth() - 6), '9m': () => c.setMonth(c.getMonth() - 9),
                '1y': () => c.setFullYear(c.getFullYear() - 1),
            }[p] || (() => { }))();
            return list.filter(t => new Date(t.date + 'T' + (t.time || '00:00')) >= c);
        };

        /* ════ DEFAULTS ════ */
        const DW = [{ id: 'w1', name: 'กระเป๋าหลัก', icon: 'fa-wallet', color: '#6c63ff' }, { id: 'w2', name: 'บัตรเครดิต', icon: 'fa-credit-card', color: '#8b5cf6' }, { id: 'w3', name: 'ออมทรัพย์', icon: 'fa-piggy-bank', color: '#00d68f' }];
        const DE = [{ id: 'e1', name: 'ค่าน้ำ', icon: 'fa-droplet', color: '#3b82f6' }, { id: 'e2', name: 'ค่าไฟ', icon: 'fa-bolt', color: '#f59e0b' }, { id: 'e3', name: 'ค่าเน็ต', icon: 'fa-wifi', color: '#8b5cf6' }, { id: 'e4', name: 'อาหาร', icon: 'fa-utensils', color: '#ff4d6d' }, { id: 'e5', name: 'เดินทาง', icon: 'fa-car', color: '#06b6d4' }, { id: 'e6', name: 'ช้อปปิ้ง', icon: 'fa-bag-shopping', color: '#ec4899' }, { id: 'e7', name: 'บันเทิง', icon: 'fa-gamepad', color: '#6366f1' }, { id: 'e8', name: 'สุขภาพ', icon: 'fa-heart-pulse', color: '#ef4444' }, { id: 'e9', name: 'อื่นๆ', icon: 'fa-circle-dot', color: '#6b7280' }];

        /* ════ SMALL COMPONENTS ════ */
        function Toast({ msg, done, type = 'success' }) {
            useEffect(() => {
                const t = setTimeout(done, 3000);

            }, []);

        function IPicker({ icons, sel, onSel, colors, selC, onSelC }) { return <div><div className="ipg">{icons.map(ic => <button key={ic} className={`ipb${sel === ic ? ' on' : ''}`} onClick={() => onSel(ic)}><i className={`fa-solid ${ic}`}></i></button>)}</div>{colors && <div className="clg">{colors.map(c => <div key={c} className={`cld${selC === c ? ' on' : ''}`} style={{ background: c }} onClick={() => onSelC(c)}></div>)}</div>}</div>; }

        /* ════ CHART ════ */
        function ChartV({ txs, ec, ic, period }) {
            const br = useRef(), per = useRef(), pir = useRef();
            const bi = useRef(), pei = useRef(), pii = useRef();
            const [ct, setCt] = useState('bar');
            const filt = useMemo(() => fpd(txs, period, null), [txs, period]);
            const mon = useMemo(() => { const m = {}; filt.forEach(t => { const [y, mo] = t.date.split('-'); const k = `${y}-${mo}`; if (!m[k]) m[k] = { inc: 0, exp: 0 }; t.type === 'income' ? m[k].inc += +t.amount : m[k].exp += +t.amount; }); return Object.entries(m).sort((a, b) => a[0].localeCompare(b[0])).slice(-7); }, [filt]);
            const ebc = useMemo(() => { const m = {}; filt.filter(t => t.type === 'expense').forEach(t => { m[t.catId] = (m[t.catId] || 0) + +t.amount; }); return m; }, [filt]);
            const ibc = useMemo(() => { const m = {}; filt.filter(t => t.type === 'income').forEach(t => { m[t.catId] = (m[t.catId] || 0) + +t.amount; }); return m; }, [filt]);
            const isDark = document.body.getAttribute('data-theme') !== 'light';
            useEffect(() => {
                if (ct !== 'bar' || !br.current) return;
                if (bi.current) bi.current.destroy();
                const labels = mon.map(([k]) => { const [y, m] = k.split('-'); return `${TM[+m - 1]} '${String(+y + 543 - 2500).slice(-2)}`; });
                bi.current = new Chart(br.current, {
                    type: 'bar', data: {
                        labels, datasets: [
                            { label: 'รายรับ', data: mon.map(([, v]) => v.inc), backgroundColor: 'rgba(0,214,143,.72)', borderRadius: 7, borderSkipped: false },
                            { label: 'รายจ่าย', data: mon.map(([, v]) => v.exp), backgroundColor: 'rgba(255,77,109,.72)', borderRadius: 7, borderSkipped: false },
                        ]
                    }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: isDark ? '#9098b8' : '#3a4260', font: { size: 11, family: 'Noto Sans Thai' } } } }, scales: { x: { grid: { color: 'rgba(128,128,128,.07)' }, ticks: { color: isDark ? '#454d6a' : '#8592b8', font: { size: 10 } } }, y: { grid: { color: 'rgba(128,128,128,.07)' }, ticks: { color: isDark ? '#454d6a' : '#8592b8', font: { size: 10 }, callback: v => fm(v) } } } }
                });
                return () => { if (bi.current) bi.current.destroy(); };
            }, [ct, mon, isDark]);
            useEffect(() => {
                if (ct !== 'pie') return;
                if (pei.current) pei.current.destroy(); if (pii.current) pii.current.destroy();
                const bc = isDark ? '#111116' : '#e8ebf4';
                const ee = Object.entries(ebc).filter(([, v]) => v > 0); const ie = Object.entries(ibc).filter(([, v]) => v > 0);
                if (per.current && ee.length > 0) pei.current = new Chart(per.current, { type: 'doughnut', data: { labels: ee.map(([id]) => ec.find(c => c.id === id)?.name || id), datasets: [{ data: ee.map(([, v]) => v), backgroundColor: ee.map(([id]) => ec.find(c => c.id === id)?.color || '#888'), borderWidth: 2, borderColor: bc }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: isDark ? '#454d6a' : '#8592b8', font: { size: 10 }, padding: 8 } } } } });
                if (pir.current && ie.length > 0) pii.current = new Chart(pir.current, { type: 'doughnut', data: { labels: ie.map(([id]) => ic.find(c => c.id === id)?.name || id), datasets: [{ data: ie.map(([, v]) => v), backgroundColor: ie.map(([id]) => ic.find(c => c.id === id)?.color || '#888'), borderWidth: 2, borderColor: bc }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: isDark ? '#454d6a' : '#8592b8', font: { size: 10 }, padding: 8 } } } } });
                return () => { if (pei.current) pei.current.destroy(); if (pii.current) pii.current.destroy(); };
            }, [ct, ebc, ibc, ec, ic, isDark]);
            return <div>
                <div className="ptabs">{[{ k: 'bar', l: 'แท่ง', i: 'fa-chart-bar' }, { k: 'pie', l: 'วงลม', i: 'fa-chart-pie' }].map(({ k, l, i }) => <button key={k} className={`pt${ct === k ? ' on' : ''}`} onClick={() => setCt(k)}><i className={`fa-solid ${i}`} style={{ marginRight: 5 }}></i>{l}</button>)}</div>
                {ct === 'bar' && <div className="c3" style={{ padding: '15px', marginBottom: 10 }}><div className="stt" style={{ marginBottom: 11 }}><i className="fa-solid fa-chart-bar"></i>รายรับ vs รายจ่ายรายเดือน</div>{mon.length === 0 ? <div className="emp"><i className="fa-solid fa-chart-bar"></i><p>ยังไม่มีข้อมูล</p></div> : <div className="chwp"><canvas ref={br}></canvas></div>}</div>}
                {ct === 'pie' && <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                    {[{ ref: per, lbl: 'รายจ่าย', c: 'var(--exp)', d: ebc }, { ref: pir, lbl: 'รายรับ', c: 'var(--inc)', d: ibc }].map(({ ref, lbl, c, d }) => (
                        <div key={lbl} className="c3" style={{ padding: '13px' }}><div style={{ fontSize: 10, fontWeight: 700, color: c, marginBottom: 9, textTransform: 'uppercase', letterSpacing: '.07em' }}>{lbl}</div>
                            {Object.keys(d).length === 0 ? <div style={{ textAlign: 'center', padding: '20px 0', color: 'var(--tx2)', fontSize: 11 }}>ไม่มีข้อมูล</div> : <div style={{ height: 165 }}><canvas ref={ref}></canvas></div>}</div>
                    ))}
                </div>}
            </div>;
        }

        /* ════ TX MODAL ════ */
        function TxM({ onClose, onSave, wallets, ec, ic, editTx }) {
            const now = thNow();
            const [type, setType] = useState(editTx?.type || 'expense');
            const [amount, setAmount] = useState(editTx?.amount ? String(editTx.amount) : '');
            const [catId, setCatId] = useState(editTx?.catId || '');

                        <div className="fg"><label className="fl">กระเป๋าเงิน</label><select value={walletId} onChange={e => setWalletId(e.target.value)}>{wallets.map(w => <option key={w.id} value={w.id}>{w.name}</option>)}</select></div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }} className="fg"><div><label className="fl">วันที่</label><input type="date" value={date} onChange={e => setDate(e.target.value)} /></div><div><label className="fl">เวลา</label><input type="time" value={time} onChange={e => setTime(e.target.value)} /></div></div>

        /* ════ WALLET MODAL ════ */
        function WM({ onClose, onSave, editW }) {

        /* ════ HOME ════ */

            const inc = filt.filter(t => t.type === 'income').reduce((s, t) => s + +t.amount, 0);
            const exp = filt.filter(t => t.type === 'expense').reduce((s, t) => s + +t.amount, 0);
            const bal = inc - exp;
            const totBal = wallets.reduce((s, w) => { const i = txs.filter(t => t.walletId === w.id && t.type === 'income').reduce((a, t) => a + +t.amount, 0); const e = txs.filter(t => t.walletId === w.id && t.type === 'expense').reduce((a, t) => a + +t.amount, 0); return s + i - e; }, 0);
            const gc = tx => (tx.type === 'income' ? ic : ec).find(c => c.id === tx.catId);
            const gw = id => wallets.find(w => w.id === id);
            const rec = [...filt].sort((a, b) => (`${b.date} ${b.time || '00:00'}`).localeCompare(`${a.date} ${a.time || '00:00'}`)).slice(0, 30);
            return <div className="pg">

                        <div className="hch"><div className="hcl"><i className="fa-solid fa-arrow-trend-down" style={{ marginRight: 3 }}></i>รายจ่าย</div><div className="hcv">฿{fm(exp)}</div></div>
                        <div className="hch"><div className="hcl"><i className="fa-solid fa-scale-balanced" style={{ marginRight: 3 }}></i>คงเหลือ</div><div className="hcv" style={{ color: bal >= 0 ? '#90ffda' : '#ffaabb' }}>{bal < 0 ? '-' : ''}฿{fm(Math.abs(bal))}</div></div>
                    </div>
                </div>
                {wallets.length > 0 && <div className="wtabs"><button className={`wt${wid === 'all' ? ' on' : ''}`} onClick={() => setWid('all')}><i className="fa-solid fa-layer-group"></i>ทั้งหมด</button>{wallets.map(w => <button key={w.id} className={`wt${wid === w.id ? ' on' : ''}`} style={wid === w.id ? { borderColor: `${w.color}88`, background: `${w.color}12`, color: w.color } : {}} onClick={() => setWid(w.id)}><i className={`fa-solid ${w.icon}`}></i>{w.name}</button>)}</div>}
                <div className="ptabs">{PRDS.map(p => <button key={p.k} className={`pt${per === p.k ? ' on' : ''}`} onClick={() => setPer(p.k)}>{p.l}</button>)}</div>
                <div className="shd"><span className="stt"><i className="fa-solid fa-clock-rotate-left"></i>รายการล่าสุด</span><span style={{ fontSize: 10, color: 'var(--tx2)' }}>{filt.length} รายการ</span></div>
                <div className="c3" style={{ padding: '3px 15px' }}>
                    {rec.length === 0 ? <div className="emp"><i className="fa-solid fa-receipt"></i><p>ยังไม่มีรายการ</p></div>
                        : rec.map(tx => {
                            const c = gc(tx); const w = gw(tx.walletId); return <div key={tx.id} className="txr" onClick={() => onEdit(tx)}>
                                <div className="txic" style={{ background: `${c?.color || '#888'}20`, color: c?.color || '#888' }}><i className={`fa-solid ${c?.icon || 'fa-circle-dot'}`}></i></div>
                                <div className="txin"><div className="txca">{c?.name || 'ไม่ระบุ'}</div><div className="txme">{w && <><i className={`fa-solid ${w.icon}`} style={{ fontSize: 9, marginRight: 3 }}></i>{w.name}</>}{tx.note && <span style={{ marginLeft: 5 }}>· {tx.note}</span>}</div></div>
                                <div className="txrt"><div className="txam" style={{ color: tx.type === 'income' ? 'var(--inc)' : 'var(--exp)' }}>{tx.type === 'income' ? '+' : '-'}฿{fm(tx.amount)}</div><div className="txdt">{fd(tx.date)}</div></div>
                            </div>;
                        })}
                </div>
            </div>;
        }

        /* ════ SUMMARY ════ */
        function Summary({ txs, ec, ic }) {
            const [per, setPer] = useState('1m');
            const filt = useMemo(() => fpd(txs, per, null), [txs, per]);
            const inc = filt.filter(t => t.type === 'income').reduce((s, t) => s + +t.amount, 0);
            const exp = filt.filter(t => t.type === 'expense').reduce((s, t) => s + +t.amount, 0);
            const ebc = useMemo(() => { const m = {}; filt.filter(t => t.type === 'expense').forEach(t => { m[t.catId] = (m[t.catId] || 0) + +t.amount; }); return Object.entries(m).sort((a, b) => b[1] - a[1]); }, [filt]);
            const ibc = useMemo(() => { const m = {}; filt.filter(t => t.type === 'income').forEach(t => { m[t.catId] = (m[t.catId] || 0) + +t.amount; }); return Object.entries(m).sort((a, b) => b[1] - a[1]); }, [filt]);
            const CB = ({ entries, cats, total, col }) => <div className="c3" style={{ padding: '3px 15px', marginTop: 4 }}>
                {entries.length === 0 ? <div className="emp" style={{ padding: '22px' }}><i className="fa-solid fa-receipt"></i><p>ไม่มีข้อมูล</p></div>
                    : entries.map(([cid, amt]) => {
                        const c = cats.find(x => x.id === cid); const pct = total > 0 ? (amt / total * 100).toFixed(1) : 0; return <div key={cid} style={{ padding: '10px 0', borderBottom: '1px solid var(--bd0)' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
                                <div style={{ width: 32, height: 32, borderRadius: 10, background: `${c?.color || '#888'}20`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, boxShadow: '0 2px 7px var(--sh)' }}><i className={`fa-solid ${c?.icon || 'fa-circle-dot'}`} style={{ color: c?.color || '#888', fontSize: 13 }}></i></div>
                                <div style={{ flex: 1 }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}><span style={{ fontSize: 13, fontWeight: 700 }}>{c?.name || 'ไม่ระบุ'}</span><span className="jb" style={{ fontSize: 12, fontWeight: 700, color: col }}>{pct}%</span></div>
                                    <div className="pb"><div className="pf" style={{ width: `${pct}%`, background: c?.color || '#888' }}></div></div>
                                    <div style={{ fontSize: 10, color: 'var(--tx2)', marginTop: 2 }}>฿{ff(amt)}</div>
                                </div>
                            </div>
                        </div>;
                    })}</div>;
            return <div className="pg">
                <div className="phd"><div className="ptl"><i className="fa-solid fa-chart-column"></i>สรุปรายงาน</div></div>
                <div className="ptabs">{PRDS.map(p => <button key={p.k} className={`pt${per === p.k ? ' on' : ''}`} onClick={() => setPer(p.k)}>{p.l}</button>)}</div>
                <div className="sg"><div className="sc sci"><div className="slb"><i className="fa-solid fa-arrow-trend-up"></i>รายรับ</div><div className="sv" style={{ color: 'var(--inc)' }}>฿{fm(inc)}</div></div><div className="sc sce"><div className="slb"><i className="fa-solid fa-arrow-trend-down"></i>รายจ่าย</div><div className="sv" style={{ color: 'var(--exp)' }}>฿{fm(exp)}</div></div></div>
                <div className="scb" style={{ marginBottom: 13 }}><div className="slb"><i className="fa-solid fa-scale-balanced"></i>คงเหลือช่วงนี้</div><div className="sv" style={{ color: inc - exp >= 0 ? 'var(--inc)' : 'var(--exp)' }}>฿{ff(inc - exp)}</div></div>
                <ChartV txs={txs} ec={ec} ic={ic} period={per} />
                <div style={{ marginTop: 13 }}><div className="shd"><span className="stt" style={{ color: 'var(--exp)' }}><i className="fa-solid fa-arrow-trend-down"></i>รายจ่ายตามหมวดหมู่</span></div><CB entries={ebc} cats={ec} total={exp} col="var(--exp)" /></div>
                <div style={{ marginTop: 13 }}><div className="shd"><span className="stt" style={{ color: 'var(--inc)' }}><i className="fa-solid fa-arrow-trend-up"></i>รายรับตามหมวดหมู่</span></div><CB entries={ibc} cats={ic} total={inc} col="var(--inc)" /></div>
            </div>;
        }

        /* ════ HISTORY ════ */
        function History({ txs, setTxs, wallets, ec, ic, toast }) {
            const [srch, setSrch] = useState(''); const [ft, setFt] = useState('all');
            const [view, setView] = useState(null); const [conf, setConf] = useState(null); const [showEd, setShowEd] = useState(false);
            const gc = tx => (tx.type === 'income' ? ic : ec).find(c => c.id === tx.catId);
            const gw = id => wallets.find(w => w.id === id);
            const filt = useMemo(() => {
                let l = [...txs]; if (ft !== 'all') l = l.filter(t => t.type === ft);
                if (srch.trim()) { const q = srch.toLowerCase(); l = l.filter(t => { const c = gc(t); return (c?.name || '').toLowerCase().includes(q) || (t.note || '').toLowerCase().includes(q); }); }
                return l.sort((a, b) => (`${b.date} ${b.time || '00:00'}`).localeCompare(`${a.date} ${a.time || '00:00'}`));
            }, [txs, ft, srch, ec, ic]);
            const sv = async (tx) => {
                try {
                    await nexoAPI.saveTransaction(tx);
                    setTxs(p => p.map(t => t.id === tx.id ? tx : t));
                    toast('แก้ไขรายการแล้ว');
                    setShowEd(false);
                    setView(null);
                } catch (e) { toast('เกิดข้อผิดพลาด: ' + e.message, true); }
            };
            const dl = async (id) => {
                try {
                    await nexoAPI.deleteTransaction(id);
                    setTxs(p => p.filter(t => t.id !== id));
                    setConf(null);
                    setView(null);
                    toast('ลบรายการแล้ว');
                } catch (e) { toast('เกิดข้อผิดพลาด: ' + e.message, true); }
            };
            return <div className="pg">
                <div className="phd"><div className="ptl"><i className="fa-solid fa-clock-rotate-left"></i>ประวัติรายการ</div></div>
                <div style={{ position: 'relative', marginBottom: 9 }}><i className="fa-solid fa-magnifying-glass" style={{ position: 'absolute', left: 13, top: '50%', transform: 'translateY(-50%)', color: 'var(--tx2)', fontSize: 13 }}></i><input value={srch} onChange={e => setSrch(e.target.value)} placeholder="ค้นหาหมวดหมู่ หรือโน๊ต..." style={{ paddingLeft: 38 }} /></div>
                <div className="ptabs" style={{ marginBottom: 11 }}>{[{ k: 'all', l: 'ทั้งหมด' }, { k: 'income', l: 'รายรับ' }, { k: 'expense', l: 'รายจ่าย' }].map(f => <button key={f.k} className={`pt${ft === f.k ? ' on' : ''}`} onClick={() => setFt(f.k)}>{f.l}</button>)}</div>
                <div style={{ fontSize: 10, color: 'var(--tx2)', marginBottom: 9, textAlign: 'right' }}>{filt.length} รายการ</div>
                <div className="c3" style={{ padding: '3px 15px' }}>
                    {filt.length === 0 ? <div className="emp"><i className="fa-solid fa-receipt"></i><p>ไม่พบรายการ</p></div>
                        : filt.map(tx => {
                            const c = gc(tx); const w = gw(tx.walletId); return <div key={tx.id} className="txr" onClick={() => setView(tx)}>
                                <div className="txic" style={{ background: `${c?.color || '#888'}20`, color: c?.color || '#888' }}><i className={`fa-solid ${c?.icon || 'fa-circle-dot'}`}></i></div>
                                <div className="txin"><div className="txca">{c?.name || 'ไม่ระบุ'}</div><div className="txme">{w && <><i className={`fa-solid ${w.icon}`} style={{ fontSize: 9, marginRight: 3 }}></i>{w.name}</>}{tx.note && <span style={{ marginLeft: 5 }}>· {tx.note}</span>}</div></div>
                                <div className="txrt"><div className="txam" style={{ color: tx.type === 'income' ? 'var(--inc)' : 'var(--exp)' }}>{tx.type === 'income' ? '+' : '-'}฿{fm(tx.amount)}</div><div className="txdt">{fd(tx.date)} {tx.time}</div></div>
                            </div>;
                        })}
                </div>
                {view && !showEd && (() => {
                    const c = gc(view); const w = gw(view.walletId); return <div className="ov" onClick={e => e.target === e.currentTarget && setView(null)}>
                        <div className="mb"><div className="mhd"><span className="mttl"><i className="fa-solid fa-receipt"></i>รายละเอียด</span><button className="mcls" onClick={() => setView(null)}><i className="fa-solid fa-xmark"></i></button></div>
                            <div className="mbdy">
                                <div style={{ textAlign: 'center', padding: '14px 0 18px' }}>
                                    <div style={{ width: 56, height: 56, borderRadius: 17, background: `${c?.color || '#888'}20`, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 11px', boxShadow: '0 4px 14px var(--sh)', fontSize: 23 }}><i className={`fa-solid ${c?.icon || 'fa-circle-dot'}`} style={{ color: c?.color || '#888' }}></i></div>
                                    <div style={{ fontSize: 12, color: 'var(--tx2)', marginBottom: 3 }}>{c?.name}</div>
                                    <div className="jb" style={{ fontSize: 30, fontWeight: 700, letterSpacing: '-1px', color: view.type === 'income' ? 'var(--inc)' : 'var(--exp)' }}>{view.type === 'income' ? '+' : '-'}฿{ff(view.amount)}</div>
                                </div>
                                <div className="c3" style={{ padding: '3px 15px', marginBottom: 15 }}>
                                    {[{ i: 'fa-calendar', l: 'วันที่', v: fd(view.date) }, { i: 'fa-clock', l: 'เวลา', v: view.time }, { i: 'fa-wallet', l: 'กระเป๋า', v: w?.name }, { i: 'fa-note-sticky', l: 'โน๊ต', v: view.note || '-' }].filter(r => r.v).map(r => <div key={r.l} style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '8px 0', borderBottom: '1px solid var(--bd0)' }}><i className={`fa-solid ${r.i}`} style={{ color: 'var(--tx2)', width: 15, textAlign: 'center' }}></i><span style={{ fontSize: 11, color: 'var(--tx2)', minWidth: 42 }}>{r.l}</span><span style={{ fontSize: 13, fontWeight: 600 }}>{r.v}</span></div>)}
                                </div>
                                <div style={{ display: 'flex', gap: 8 }}><button className="bg" style={{ flex: 1 }} onClick={() => setShowEd(true)}><i className="fa-solid fa-pen"></i>แก้ไข</button><button className="bd" style={{ flex: 1 }} onClick={() => setConf(view.id)}><i className="fa-solid fa-trash"></i>ลบ</button><button className="bg" style={{ flex: 1 }} onClick={() => setView(null)}>ปิด</button></div>
                            </div></div>
                    </div>;
                })()}
                {view && showEd && <TxM onClose={() => setShowEd(false)} onSave={sv} wallets={wallets} ec={ec} ic={ic} editTx={view} />}
                {conf && <Confirm onOk={() => dl(conf)} onNo={() => setConf(null)} />}
            </div>;
        }

        /* ════ WALLETS PAGE ════ */
        function Wallets({ wallets, setWallets, txs, toast }) {
            const [showM, setShowM] = useState(false); const [editW, setEditW] = useState(null); const [conf, setConf] = useState(null);
            const gb = wid => { const i = txs.filter(t => t.walletId === wid && t.type === 'income').reduce((s, t) => s + +t.amount, 0); const e = txs.filter(t => t.walletId === wid && t.type === 'expense').reduce((s, t) => s + +t.amount, 0); return i - e; };
            const sv = async (w) => {
                try {
                    await nexoAPI.saveWallet(w);
                    if (editW) setWallets(p => p.map(x => x.id === w.id ? w : x));
                    else setWallets(p => [...p, w]);
                    toast(editW ? 'แก้ไขกระเป๋าแล้ว' : 'สร้างกระเป๋าใหม่แล้ว');
                    setShowM(false);
                    setEditW(null);
                } catch (e) { toast('เกิดข้อผิดพลาด: ' + e.message, true); }
            };
            const dl = async (id) => {
                try {
                    await nexoAPI.deleteWallet(id);
                    setWallets(p => p.filter(w => w.id !== id));
                    setConf(null);
                    toast('ลบกระเป๋าแล้ว');
                } catch (e) { toast('เกิดข้อผิดพลาด: ' + e.message, true); }
            };
            return <div className="pg">
                <div className="phd"><div className="ptl"><i className="fa-solid fa-wallet"></i>กระเป๋าเงิน</div><button className="bp" style={{ padding: '8px 15px', fontSize: 12 }} onClick={() => { setEditW(null); setShowM(true); }}><i className="fa-solid fa-plus"></i>เพิ่มกระเป๋า</button></div>
                {wallets.length === 0 ? <div className="emp"><i className="fa-solid fa-wallet"></i><p>ยังไม่มีกระเป๋าเงิน</p></div>
                    : wallets.map(w => {
                        const b = gb(w.id); return <div key={w.id} className="wr">
                            <div className="wic" style={{ background: `${w.color}20` }}><i className={`fa-solid ${w.icon}`} style={{ color: w.color }}></i></div>
                            <div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 13.5 }}>{w.name}</div><div className="wb" style={{ color: b >= 0 ? 'var(--inc)' : 'var(--exp)' }}>{b < 0 ? '-' : ''}฿{ff(Math.abs(b))}</div></div>
                            <div style={{ display: 'flex', gap: 6 }}><button className="bs" onClick={() => { setEditW(w); setShowM(true); }}><i className="fa-solid fa-pen"></i></button><button className="bs bsd" onClick={() => setConf(w.id)}><i className="fa-solid fa-trash"></i></button></div>
                        </div>;
                    })}
                {showM && <WM onClose={() => { setShowM(false); setEditW(null); }} onSave={sv} editW={editW} />}
                {conf && <Confirm msg="ลบกระเป๋าเงิน?" onOk={() => dl(conf)} onNo={() => setConf(null)} />}
            </div>;
        }

        /* ════ CATS PAGE ════ */
        function Cats({ ec, setEc, ic, setIc, toast }) {
            const [tab, setTab] = useState('expense'); const [showM, setShowM] = useState(false); const [editC, setEditC] = useState(null); const [conf, setConf] = useState(null);
            const cats = tab === 'expense' ? ec : ic; const setCats = tab === 'expense' ? setEc : setIc;
            const sv = async (c) => {
                try {
                    if (tab === 'expense') await nexoAPI.saveExpenseCat(c);
                    else await nexoAPI.saveIncomeCat(c);
                    if (editC) setCats(p => p.map(x => x.id === c.id ? c : x));
                    else setCats(p => [...p, c]);
                    toast(editC ? 'แก้ไขหมวดหมู่แล้ว' : 'สร้างหมวดหมู่ใหม่แล้ว');
                    setShowM(false);
                    setEditC(null);
                } catch (e) { toast('เกิดข้อผิดพลาด: ' + e.message, true); }
            };
            const dl = async (id) => {
                try {
                    if (tab === 'expense') await nexoAPI.deleteExpenseCat(id);
                    else await nexoAPI.deleteIncomeCat(id);
                    setCats(p => p.filter(c => c.id !== id));
                    setConf(null);
                    toast('ลบหมวดหมู่แล้ว');
                } catch (e) { toast('เกิดข้อผิดพลาด: ' + e.message, true); }
            };
            return <div className="pg">
                <div className="phd"><div className="ptl"><i className="fa-solid fa-tags"></i>หมวดหมู่</div><button className="bp" style={{ padding: '8px 15px', fontSize: 12 }} onClick={() => { setEditC(null); setShowM(true); }}><i className="fa-solid fa-plus"></i>เพิ่ม</button></div>
                <div className="ttog" style={{ marginBottom: 15 }}><button className={`tb exp${tab === 'expense' ? ' on' : ''}`} onClick={() => setTab('expense')}><i className="fa-solid fa-arrow-trend-down"></i>รายจ่าย</button><button className={`tb inc${tab === 'income' ? ' on' : ''}`} onClick={() => setTab('income')}><i className="fa-solid fa-arrow-trend-up"></i>รายรับ</button></div>
                <div className="c3" style={{ padding: '3px 15px' }}>
                    {cats.length === 0 ? <div className="emp"><i className="fa-solid fa-tags"></i><p>ยังไม่มีหมวดหมู่</p></div>
                        : cats.map(c => <div key={c.id} className="seti">
                            <div className="seic" style={{ background: `${c.color}20` }}><i className={`fa-solid ${c.icon}`} style={{ color: c.color }}></i></div>
                            <div style={{ flex: 1 }}><div className="slbl">{c.name}</div></div>
                            <div className="sact"><button className="bs" onClick={() => { setEditC(c); setShowM(true); }}><i className="fa-solid fa-pen"></i></button><button className="bs bsd" onClick={() => setConf(c.id)}><i className="fa-solid fa-trash"></i></button></div>
                        </div>)}
                </div>
                {showM && <CM onClose={() => { setShowM(false); setEditC(null); }} onSave={sv} editC={editC} type={tab} />}
                {conf && <Confirm onOk={() => dl(conf)} onNo={() => setConf(null)} />}
            </div>;
        }

        /* ════ THEME PAGE ════ */
        function Theme({ isDark, setIsDark, acc, setAcc, onSaveSettings }) {
            const [ch, setCh] = useState(acc);
            const applyC = () => { if (/^#[0-9a-fA-F]{6}$/.test(ch.trim())) { setAcc(ch.trim()); onSaveSettings({ isDark, acc: ch.trim() }); } };
            const toggleDark = () => { const nd = !isDark; setIsDark(nd); onSaveSettings({ isDark: nd, acc }); };
            const selectAcc = (c) => { setAcc(c); onSaveSettings({ isDark, acc: c }); };
            return <div className="pg">
                <div className="phd"><div className="ptl"><i className="fa-solid fa-palette"></i>ธีม & สี</div></div>
                <div className="c3" style={{ padding: '3px 20px', marginBottom: 11 }}>
                    <div className="trow">
                        <div><div className="trlbl"><i className="fa-solid fa-circle-half-stroke" style={{ marginRight: 6, color: 'var(--acc)' }}></i>โหมดสี</div><div className="trsub">{isDark ? 'โหมดมืด (Dark)' : 'โหมดสว่าง (Light)'}</div></div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
                            <i className="fa-solid fa-sun" style={{ color: 'var(--gld)', fontSize: 15 }}></i>
                            <div className={`sw${isDark ? ' on' : ''}`} onClick={toggleDark}></div>
                            <i className="fa-solid fa-moon" style={{ color: 'var(--acc)', fontSize: 15 }}></i>
                        </div>
                    </div>
                </div>
                <div className="c3" style={{ padding: '17px 19px', marginBottom: 11 }}>
                    <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 13 }}><i className="fa-solid fa-swatchbook" style={{ marginRight: 6, color: 'var(--acc)' }}></i>สีธีมหลัก (Preset)</div>
                    <div className="asw">{ACCS.map(p => <div key={p.h} className={`as${acc === p.h ? ' on' : ''}`} style={{ background: p.h }} onClick={() => selectAcc(p.h)} title={p.l}></div>)}</div>
                    <div style={{ marginTop: 15 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--tx2)', marginBottom: 7, textTransform: 'uppercase', letterSpacing: '.07em' }}>กำหนดสีเอง (HEX)</div>
                        <div style={{ display: 'flex', gap: 8 }}>
                            <div style={{ position: 'relative', flex: 1 }}>
                                <div style={{ position: 'absolute', left: 11, top: '50%', transform: 'translateY(-50%)', width: 17, height: 17, borderRadius: 5, background: ch, border: '2px solid var(--bd1)' }}></div>
                                <input value={ch} onChange={e => setCh(e.target.value)} placeholder="#6c63ff" style={{ paddingLeft: 36, fontFamily: 'JetBrains Mono,monospace', fontSize: 13 }} />
                            </div>
                            <button className="bp" style={{ padding: '10px 14px', fontSize: 12, flexShrink: 0 }} onClick={applyC}>ใช้สีนี้</button>
                        </div>
                    </div>
                </div>
                <div className="c3" style={{ padding: '17px 19px' }}>
                    <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 13 }}><i className="fa-solid fa-eye" style={{ marginRight: 6, color: 'var(--acc)' }}></i>ตัวอย่าง UI</div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 9 }}>
                        <button className="bp" style={{ width: '100%' }}><i className="fa-solid fa-plus"></i>ปุ่มหลัก (Primary)</button>
                        <div className="hero" style={{ padding: '15px 17px' }}>
                            <div className="hl">ยอดคงเหลือ</div><div className="ha">฿12,345.67</div><div className="hs">ตัวอย่าง Hero Card</div>
                        </div>
                        <div className="sg" style={{ marginBottom: 0 }}>
                            <div className="sc sci"><div className="slb"><i className="fa-solid fa-arrow-trend-up"></i>รายรับ</div><div className="sv" style={{ color: 'var(--inc)', fontSize: 16 }}>฿5,000</div></div>
                            <div className="sc sce"><div className="slb"><i className="fa-solid fa-arrow-trend-down"></i>รายจ่าย</div><div className="sv" style={{ color: 'var(--exp)', fontSize: 16 }}>฿2,000</div></div>
                        </div>
                    </div>
                </div>
            </div>;
        }

        /* ════ APP ════ */
        function App() {
            const [pg, setPg] = useState('home');
            const [txs, setTxs] = useState([]);
            const [wallets, setWallets] = useState([]);
            const [ec, setEc] = useState([]);
            const [ic, setIc] = useState([]);
            const [isDark, setIsDark] = useState(true);
            const [acc, setAcc] = useState(ACCS[0].h);
            const [showTxM, setShowTxM] = useState(false);
            const [editTx, setEditTx] = useState(null);
            const [toast, setToast] = useState(null);
            const [toastType, setToastType] = useState('success');
            const [loading, setLoading] = useState(true);
            const [initDone, setInitDone] = useState(false);

            const showT = (msg, isError = false) => {
                setToast(msg);
                setToastType(isError ? 'error' : 'success');
            };

            // nexo: โหลดข้อมูลทั้งหมดจาก Google Sheets
            useEffect(() => {
                const loadAllData = async () => {
                    try {
                        setLoading(true);

                        // โหลดข้อมูลทั้งหมดพร้อมกัน
                        const [txsData, walletsData, ecData, icData, settingsData] = await Promise.all([
                            nexoAPI.getTransactions().catch(() => []),
                            nexoAPI.getWallets().catch(() => DW),
                            nexoAPI.getExpenseCats().catch(() => DE),
                            nexoAPI.getIncomeCats().catch(() => DI),
                            nexoAPI.getSettings().catch(() => null)
                        ]);

                        setTxs(txsData || []);
                        setWallets(walletsData.length > 0 ? walletsData : DW);
                        setEc(ecData.length > 0 ? ecData : DE);
                        setIc(icData.length > 0 ? icData : DI);

                        if (settingsData) {
                            setIsDark(settingsData.isDark !== false);
                            setAcc(settingsData.acc || ACCS[0].h);
                            applyT(settingsData.acc || ACCS[0].h, settingsData.isDark !== false);
                        }

                        setInitDone(true);
                    } catch (error) {
                        console.error('nexo load error:', error);
                        // fallback to defaults
                        setWallets(DW);
                        setEc(DE);
                        setIc(DI);
                        setInitDone(true);
                        showT('ไม่สามารถโหลดข้อมูลจากเซิร์ฟเวอร์ได้ ใช้ข้อมูลเริ่มต้น', true);
                    } finally {
                        setLoading(false);
                    }
                };

                loadAllData();
            }, []);

            // nexo: บันทึก settings เมื่อมีการเปลี่ยนแปลง
            const saveSettings = async (settings) => {
                try {
                    await nexoAPI.saveSettings(settings);
                } catch (error) {
                    console.error('nexo save settings error:', error);
                }
            };

            useEffect(() => {
                if (!initDone) return;
                applyT(acc, isDark);
                saveSettings({ isDark, acc });
            }, [isDark, acc, initDone]);

            const saveTx = async (tx) => {
                try {
                    await nexoAPI.saveTransaction(tx);
                    if (editTx) {
                        setTxs(p => p.map(t => t.id === tx.id ? tx : t));
                    } else {
                        setTxs(p => [tx, ...p]);
                    }
                    showT(editTx ? 'แก้ไขรายการแล้ว' : tx.type === 'income' ? 'เพิ่มรายรับแล้ว' : 'เพิ่มรายจ่ายแล้ว');
                    setEditTx(null);
                    setShowTxM(false);
                } catch (e) {
                    console.error('Save transaction error:', e);
                    showT('เกิดข้อผิดพลาด: ' + e.message, true);
                }
            };

            const openEd = tx => { setEditTx(tx); setShowTxM(true); };

            const SNV = [{ id: 'home', i: 'fa-house', l: 'หน้าแรก' }, { id: 'summary', i: 'fa-chart-column', l: 'สรุปรายงาน' }, { id: 'history', i: 'fa-clock-rotate-left', l: 'ประวัติรายการ' }, { id: 'wallets', i: 'fa-wallet', l: 'กระเป๋าเงิน' }, { id: 'cats', i: 'fa-tags', l: 'หมวดหมู่' }, { id: 'theme', i: 'fa-palette', l: 'ธีม & สี' }];
            const BNV = [{ id: 'home', i: 'fa-house', l: 'หน้าแรก' }, { id: 'summary', i: 'fa-chart-column', l: 'รายงาน' }, { id: 'ADD', fab: true }, { id: 'history', i: 'fa-clock-rotate-left', l: 'ประวัติ' }, { id: 'theme', i: 'fa-palette', l: 'ธีม' }];

            const rp = () => {
                if (loading) {
                    return <div className="nexo-loader"><i className="fa-solid fa-spinner"></i></div>;
                }
                switch (pg) {
                    case 'home': return <Home txs={txs} wallets={wallets} ec={ec} ic={ic} onEdit={openEd} />;
                    case 'summary': return <Summary txs={txs} ec={ec} ic={ic} />;
                    case 'history': return <History txs={txs} setTxs={setTxs} wallets={wallets} ec={ec} ic={ic} toast={showT} />;
                    case 'wallets': return <Wallets wallets={wallets} setWallets={setWallets} txs={txs} toast={showT} />;
                    case 'cats': return <Cats ec={ec} setEc={setEc} ic={ic} setIc={setIc} toast={showT} />;
                    case 'theme': return <Theme isDark={isDark} setIsDark={setIsDark} acc={acc} setAcc={setAcc} onSaveSettings={saveSettings} />;
                    default: return null;
                }
            };

            return <div id="app">
                {/* SIDEBAR */}
                <nav id="sb">
                    <div className="sl">
                        <div className="orb"><i className="fa-solid fa-money-bill-trend-up"></i></div>
                        <div><div className="lt">MoneyFlow</div><div className="ls">nexo cloud</div></div>
                    </div>
                    <button className="sadd" onClick={() => { setEditTx(null); setShowTxM(true); }}>
                        <i className="fa-solid fa-circle-plus" style={{ fontSize: 15 }}></i>เพิ่มรายการใหม่
                    </button>
                    <div className="ssec">เมนูหลัก</div>
                    {SNV.map(n => <button key={n.id} className={`si${pg === n.id ? ' on' : ''}`} onClick={() => setPg(n.id)}><i className={`fa-solid ${n.i}`}></i>{n.l}</button>)}
                </nav>

                {/* MAIN */}
                <div id="mw">
                    <div className="mhdr">
                        <div className="mhl">
                            <div className="orb" style={{ width: 30, height: 30, borderRadius: 9, fontSize: 13 }}><i className="fa-solid fa-money-bill-trend-up"></i></div>
                            MoneyFlow
                        </div>
                        <div className="mhr">
                            <button className="bs" onClick={() => setPg('wallets')} title="กระเป๋าเงิน"><i className="fa-solid fa-wallet"></i></button>
                            <button className="bs" onClick={() => setPg('theme')} title="ธีม"><i className="fa-solid fa-palette"></i></button>
                            <button className="bp" style={{ padding: '7px 13px', fontSize: 12 }} onClick={() => { setEditTx(null); setShowTxM(true); }}><i className="fa-solid fa-plus"></i>เพิ่ม</button>
                        </div>
                    </div>
                    {rp()}
                </div>

                {/* BOTTOM NAV */}
                <nav id="bn">
                    {BNV.map(n => n.fab
                        ? <div key="fab" className="fabw" onClick={() => { setEditTx(null); setShowTxM(true); }}>
                            <div className="fabo"><i className="fa-solid fa-plus"></i></div>
                            <span style={{ fontSize: 10, color: 'var(--tx2)', fontWeight: 600 }}>เพิ่ม</span>
                        </div>
                        : <button key={n.id} className={`bni${pg === n.id ? ' on' : ''}`} onClick={() => setPg(n.id)}>
                            <i className={`fa-solid ${n.i}`}></i>{n.l}
                        </button>
                    )}
                </nav>

                {showTxM && <TxM onClose={() => { setShowTxM(false); setEditTx(null); }} onSave={saveTx} wallets={wallets} ec={ec} ic={ic} editTx={editTx} />}
                {toast && <Toast msg={toast} done={() => setToast(null)} type={toastType} />}
            </div>;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
